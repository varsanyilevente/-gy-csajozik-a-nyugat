<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyugat — Admin</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-page main { max-width: 600px; }

    #auth-panel { margin-top: 1.5rem; }
    #auth-panel h2 { margin-bottom: 1rem; }
    #auth-error { color: var(--red); font-size: 0.9rem; margin-top: 0.5rem; display: none; }

    #control-panel { display: none; margin-top: 1rem; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--paper-dark);
      border: 1.5px solid var(--ink-mid);
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .status-phase {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .phase-voting   { color: var(--red); }
    .phase-waiting  { color: var(--ink-mid); }
    .phase-finished { color: var(--gold); }

    .poet-card { padding: 0.9rem 0; border-bottom: 1px solid var(--paper-dark); }

    .poet-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .poet-card-info .poet-name-admin {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .poet-card-info .poet-verse-admin { font-style: italic; font-size: 0.85rem; color: var(--ink-light); }
    .poet-card-info .poet-score-admin { font-size: 0.8rem; color: var(--ink-mid); margin-top: 0.25rem; }

    .vote-breakdown {
      display: inline-flex;
      gap: 0.75rem;
      margin-top: 0.2rem;
      font-size: 0.78rem;
      color: var(--ink-mid);
    }
    .vb-nope  { color: var(--red); }
    .vb-like  { color: #1F3A6E; }
    .vb-super { color: var(--gold); }

    .poet-card-btn { flex-shrink: 0; }

    .btn-open {
      padding: 0.45rem 1rem;
      background: transparent;
      border: 1.5px solid var(--ink);
      font-family: 'IM Fell English', serif;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .btn-open:hover { background: var(--ink); color: var(--paper); }

    .btn-open.is-active {
      background: var(--red);
      color: var(--paper);
      border-color: var(--red);
    }

    .global-controls {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn-ctrl {
      padding: 0.5rem 1rem;
      font-family: 'IM Fell English', serif;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1.5px solid var(--ink);
      background: transparent;
      transition: background 0.15s, color 0.15s;
    }

    .btn-ctrl:hover { background: var(--ink); color: var(--paper); }

    .btn-ctrl.danger { border-color: var(--red); color: var(--red); }
    .btn-ctrl.danger:hover { background: var(--red); color: var(--paper); }

    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 10, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .confirm-overlay.visible { display: flex; }

    .confirm-box {
      background: var(--paper);
      border: 2px solid var(--ink);
      padding: 2rem;
      max-width: 360px;
      text-align: center;
    }

    .confirm-box h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.75rem; }
    .confirm-box p  { font-size: 0.9rem; color: var(--ink-mid); margin-bottom: 1.25rem; }
    .confirm-box .confirm-btns { display: flex; gap: 0.75rem; justify-content: center; }
  </style>
</head>
<body class="admin-page">

  <header class="masthead">
    <div class="masthead-eyebrow">I. ÉVFOLYAM · 1908 JANUÁR 1. · I. SZÁM</div>
    <h1 class="masthead-title">NYUGAT</h1>
    <div class="masthead-sub">Szerkesztőségi vezérlőpult</div>
  </header>

  <main>

    <div id="auth-panel">
      <div class="ornament">❧</div>
      <h2>Szerkesztőségi belépés</h2>
      <form id="auth-form">
        <input type="password" id="pw-input" placeholder="Jelszó…">
        <button type="submit" class="btn-primary">Belépés</button>
      </form>
      <p id="auth-error">Hibás jelszó.</p>
    </div>

    <div id="control-panel">

      <div class="status-bar">
        <div>
          Állapot: <span id="status-phase" class="status-phase"></span>
          &nbsp;|&nbsp; Résztvevők: <span id="voter-count">0</span>
        </div>
        <div id="status-current"></div>
      </div>

      <div id="poet-list"></div>

      <div class="global-controls">
        <button class="btn-ctrl" id="btn-close">Várakozó képernyő</button>
        <button class="btn-ctrl" id="btn-finish">Verseny befejezése</button>
        <button class="btn-ctrl danger" id="btn-reset">Teljes visszaállítás</button>
      </div>

    </div>

  </main>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <h3>Biztos vagy benne?</h3>
      <p id="confirm-msg"></p>
      <div class="confirm-btns">
        <button class="btn-ctrl danger" id="confirm-yes">Igen, folytatom</button>
        <button class="btn-ctrl" id="confirm-no">Mégsem</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyCwGOKGOiDqQrmDjfADi8zPr4B8T_kRFgY",
      authDomain:        "nyugat-szavazas.firebaseapp.com",
      databaseURL:       "https://nyugat-szavazas-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "nyugat-szavazas",
      storageBucket:     "nyugat-szavazas.firebasestorage.app",
      messagingSenderId: "882814100864",
      appId:             "1:882814100864:web:dc03a77bebe475e8c3cd65"
    });
    const db = firebase.database();

    const ADMIN_PASSWORD = 'nyugat1908';

    const POETS = [
      { id: 0, name: 'Ady Endre',         verse: 'Vér és arany'              },
      { id: 1, name: 'Babits Mihály',      verse: 'Levelek Iris koszorújából' },
      { id: 2, name: 'Kosztolányi Dezső',  verse: 'Négy fal között'           },
      { id: 3, name: 'Móricz Zsigmond',    verse: 'Sárarany'                  },
      { id: 4, name: 'Karinthy Frigyes',   verse: 'Így írtok ti'              },
    ];

    let isAuthed  = false;
    let adminPhase = 'waiting';
    let adminPoetIdx = -1;
    let adminScores = {};

    // ── Auth ──────────────────────────────────────────────────────
    document.getElementById('auth-form').addEventListener('submit', e => {
      e.preventDefault();
      const pw = document.getElementById('pw-input').value;
      if (pw !== ADMIN_PASSWORD) {
        document.getElementById('auth-error').style.display = 'block';
        return;
      }
      isAuthed = true;
      document.getElementById('auth-panel').style.display    = 'none';
      document.getElementById('control-panel').style.display = 'block';
      initListeners();
    });

    // ── Firebase listeners ─────────────────────────────────────────
    function initListeners() {
      db.ref('state').on('value', snap => {
        const s = snap.val() || {};
        adminPhase   = s.phase || 'waiting';
        adminPoetIdx = (s.currentPoetIndex !== undefined) ? s.currentPoetIndex : -1;
        renderStatus();
        renderPoetList();
      });

      db.ref('scores').on('value', snap => {
        adminScores = snap.val() || {};
        renderPoetList();
      });

      db.ref('voters').on('value', snap => {
        document.getElementById('voter-count').textContent = snap.numChildren();
      });
    }

    // ── Render ─────────────────────────────────────────────────────
    function renderStatus() {
      const phaseLabels  = { waiting: 'Várakozás', voting: 'Szavazás aktív', finished: 'Vége' };
      const phaseClasses = { waiting: 'phase-waiting', voting: 'phase-voting', finished: 'phase-finished' };
      const phaseEl = document.getElementById('status-phase');
      phaseEl.textContent = phaseLabels[adminPhase] || adminPhase;
      phaseEl.className   = 'status-phase ' + (phaseClasses[adminPhase] || '');

      const curEl = document.getElementById('status-current');
      curEl.textContent = (adminPhase === 'voting' && adminPoetIdx >= 0)
        ? 'Jelenlegi: ' + POETS[adminPoetIdx].name
        : '';
    }

    function renderPoetList() {
      document.getElementById('poet-list').innerHTML = POETS.map((p, i) => {
        const s        = adminScores[i] || { totalScore: 0, voteCount: 0 };
        const avg      = s.voteCount > 0 ? +(s.totalScore / s.voteCount).toFixed(2) : 0;
        const isActive = adminPhase === 'voting' && adminPoetIdx === i;
        return `
          <div class="poet-card">
            <div class="poet-card-header">
              <div class="poet-card-info">
                <div class="poet-name-admin">${p.name}</div>
                <div class="poet-verse-admin">${p.verse}</div>
                <div class="poet-score-admin">
                  ${s.totalScore || 0} pont · ${s.voteCount || 0} szavazat · ⌀ ${avg}
                </div>
                <div class="vote-breakdown">
                  <span class="vb-nope">✕ ${s.nope || 0} nope</span>
                  <span class="vb-like">❤ ${s.like || 0} like</span>
                  <span class="vb-super">★ ${s.superlike || 0} super</span>
                </div>
              </div>
              <div class="poet-card-btn">
                <button class="btn-open ${isActive ? 'is-active' : ''}"
                        onclick="openVoting(${i})"
                        ${isActive ? 'disabled' : ''}>
                  ${isActive ? '● Aktív' : 'Szavazás nyitása'}
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ── Actions ────────────────────────────────────────────────────
    async function openVoting(poetIndex) {
      const votersSnap = await db.ref('voters').get();
      const updates = { 'state/phase': 'voting', 'state/currentPoetIndex': poetIndex };
      votersSnap.forEach(child => {
        updates['voters/' + child.key + '/hasVoted'] = false;
      });
      await db.ref().update(updates);
    }

    document.getElementById('btn-close').addEventListener('click', () => {
      db.ref('state/phase').set('waiting');
    });

    document.getElementById('btn-finish').addEventListener('click', () => {
      askConfirm('A verseny befejezése — minden szavazás lezárul.', async () => {
        await db.ref('state').update({ phase: 'finished', currentPoetIndex: -1 });
      });
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      askConfirm('TELJES VISSZAÁLLÍTÁS — minden pont törlődik, a szavazás elölről kezdődik.', async () => {
        await db.ref().update({
          state:     { phase: 'waiting', currentPoetIndex: -1 },
          scores:    null,
          voters:    null,
          lastVote:  null,
        });
      });
    });

    // ── Confirm dialog ─────────────────────────────────────────────
    let confirmCb = null;

    function askConfirm(msg, cb) {
      document.getElementById('confirm-msg').textContent = msg;
      document.getElementById('confirm-overlay').classList.add('visible');
      confirmCb = cb;
    }

    document.getElementById('confirm-yes').addEventListener('click', () => {
      document.getElementById('confirm-overlay').classList.remove('visible');
      if (confirmCb) confirmCb();
      confirmCb = null;
    });

    document.getElementById('confirm-no').addEventListener('click', () => {
      document.getElementById('confirm-overlay').classList.remove('visible');
      confirmCb = null;
    });
  </script>
</body>
</html>
